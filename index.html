<!DOCTYPE html>
<html lang="ru">
<head>
  <title>MDV</title>
  <meta name="apple-mobile-web-app-title" content="MDV">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta charset="UTF-8" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f8f9fc; font-family: 'Segoe UI', sans-serif; }
    input, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #dde; border-radius: 99px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const ACCENT = "#5B8DEF", LIGHT_ACCENT = "#EBF1FF", TEXT = "#1a1a2e";
const MUTED = "#8892a4", BG = "#f8f9fc", WHITE = "#ffffff", BORDER = "#e8eaf0", GREEN = "#34C770";

const todayKey = new Date().toISOString().split("T")[0];
const todayLabel = new Date().toLocaleDateString("ru-RU", { weekday: "long", day: "numeric", month: "long" });

// ── storage helpers ───────────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

// ── hooks ─────────────────────────────────────────────────────────────────────
function useList(storageKey) {
  const [items, setItems] = useState(() => load(storageKey, []));
  useEffect(() => { save(storageKey, items); }, [items]);
  const add = (text) => { if (text.trim()) setItems(p => [...p, { id: Date.now(), text: text.trim(), done: false }]); };
  const toggle = (id) => setItems(p => p.map(i => i.id === id ? { ...i, done: !i.done } : i));
  const remove = (id) => setItems(p => p.filter(i => i.id !== id));
  return { items, add, toggle, remove };
}

// ── ui components ─────────────────────────────────────────────────────────────
function AddInput({ placeholder, onAdd, accent = ACCENT }) {
  const [val, setVal] = useState("");
  const submit = () => { onAdd(val); setVal(""); };
  return (
    <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
      <input value={val} onChange={e => setVal(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()}
        placeholder={placeholder} style={{ flex: 1, border: `1.5px solid ${BORDER}`, borderRadius: 10, padding: "9px 14px", fontSize: 14, color: TEXT, background: BG, outline: "none" }} />
      <button onClick={submit} style={{ background: accent, border: "none", borderRadius: 10, padding: "9px 18px", color: "#fff", fontSize: 18, cursor: "pointer" }}>+</button>
    </div>
  );
}

function CheckList({ items, toggle, remove, accent = ACCENT }) {
  if (!items.length) return <p style={{ color: MUTED, fontSize: 13, marginTop: 10 }}>Пусто — добавьте первый пункт</p>;
  return (
    <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 6 }}>
      {items.map(item => (
        <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 10, background: item.done ? "#f0f4ff" : WHITE, border: `1px solid ${item.done ? LIGHT_ACCENT : BORDER}`, borderRadius: 10, padding: "9px 12px" }}>
          <button onClick={() => toggle(item.id)} style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${item.done ? accent : BORDER}`, background: item.done ? accent : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            {item.done && <span style={{ color: "#fff", fontSize: 12, fontWeight: "bold" }}>✓</span>}
          </button>
          <span style={{ flex: 1, fontSize: 14, color: item.done ? MUTED : TEXT, textDecoration: item.done ? "line-through" : "none" }}>{item.text}</span>
          <button onClick={() => remove(item.id)} style={{ background: "none", border: "none", cursor: "pointer", color: MUTED, fontSize: 16 }}>×</button>
        </div>
      ))}
    </div>
  );
}

function Section({ emoji, title, children, onRemove, rightBadge }) {
  const [open, setOpen] = useState(true);
  return (
    <div style={{ background: WHITE, borderRadius: 16, border: `1px solid ${BORDER}`, padding: "18px 20px", marginBottom: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 20 }}>{emoji}</span>
        <span style={{ fontWeight: 600, fontSize: 16, color: TEXT, flex: 1 }}>{title}</span>
        {rightBadge}
        {onRemove && <button onClick={onRemove} style={{ background: "none", border: "none", cursor: "pointer", color: MUTED, fontSize: 15 }}>🗑</button>}
        <button onClick={() => setOpen(o => !o)} style={{ background: "none", border: "none", cursor: "pointer", color: MUTED, fontSize: 18 }}>{open ? "−" : "+"}</button>
      </div>
      {open && <div>{children}</div>}
    </div>
  );
}

// ── journal ───────────────────────────────────────────────────────────────────
function Journal({ dateKey }) {
  const key = `journal-${dateKey}`;
  const [text, setText] = useState(() => load(key, ""));
  const [saved, setSaved] = useState(true);

  const handleSave = () => { save(key, text); setSaved(true); };

  return (
    <div style={{ marginTop: 10 }}>
      <textarea value={text} onChange={e => { setText(e.target.value); setSaved(false); }}
        placeholder="Что сегодня важно? Мысли, идеи, рефлексия…" rows={5}
        style={{ width: "100%", border: `1.5px solid ${BORDER}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, color: TEXT, background: BG, resize: "vertical", outline: "none", lineHeight: 1.6 }} />
      <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8, gap: 10, alignItems: "center" }}>
        {saved ? <span style={{ color: GREEN, fontSize: 13 }}>✓ Сохранено</span> : <span style={{ color: MUTED, fontSize: 13 }}>Не сохранено</span>}
        <button onClick={handleSave} style={{ background: ACCENT, border: "none", borderRadius: 10, padding: "8px 20px", color: "#fff", fontSize: 14, cursor: "pointer" }}>Сохранить</button>
      </div>
    </div>
  );
}

// ── archive ───────────────────────────────────────────────────────────────────
function Archive({ onClose }) {
  const allKeys = Object.keys(localStorage).filter(k => k.startsWith("journal-")).sort().reverse();

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 }}>
      <div style={{ background: WHITE, borderRadius: 20, padding: "28px", width: 420, maxHeight: "80vh", overflowY: "auto", boxShadow: "0 8px 40px rgba(0,0,0,0.15)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h3 style={{ fontSize: 18, color: TEXT }}>📅 Архив дней</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: MUTED }}>×</button>
        </div>
        {allKeys.length === 0 && <p style={{ color: MUTED, fontSize: 14 }}>Архив пуст — сохраните первую запись в дневнике</p>}
        {allKeys.map(k => {
          const date = k.replace("journal-", "");
          const text = load(k, "");
          const tasksData = load(`tasks-${date}`, []);
          const done = tasksData.filter(t => t.done).length;
          const total = tasksData.length;
          const label = new Date(date).toLocaleDateString("ru-RU", { weekday: "short", day: "numeric", month: "long" });
          return (
            <div key={k} style={{ border: `1px solid ${BORDER}`, borderRadius: 12, padding: "14px 16px", marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ fontWeight: 600, fontSize: 14, color: TEXT }}>{label}</span>
                {total > 0 && <span style={{ fontSize: 12, color: MUTED }}>✅ {done}/{total} задач</span>}
              </div>
              {text ? <p style={{ fontSize: 13, color: MUTED, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{text.slice(0, 200)}{text.length > 200 ? "…" : ""}</p>
                : <p style={{ fontSize: 13, color: BORDER }}>Запись дневника отсутствует</p>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── custom section ────────────────────────────────────────────────────────────
const EMOJI_OPTIONS = ["⚡","📚","💪","🎨","🧘","💡","🏃","🍎","🎵","💻","🌱","✈️","💰","🧠","🔥"];

function AddSectionModal({ onAdd, onClose }) {
  const [title, setTitle] = useState("");
  const [emoji, setEmoji] = useState("⚡");
  const [type, setType] = useState("checklist");
  const submit = () => { if (!title.trim()) return; onAdd({ title: title.trim(), emoji, type, id: Date.now() }); onClose(); };
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.25)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }}>
      <div style={{ background: WHITE, borderRadius: 20, padding: "28px", width: 340, boxShadow: "0 8px 40px rgba(0,0,0,0.15)" }}>
        <h3 style={{ margin: "0 0 20px", fontSize: 18, color: TEXT }}>Новый раздел</h3>
        <div style={{ fontSize: 12, color: MUTED, marginBottom: 8 }}>ИКОНКА</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
          {EMOJI_OPTIONS.map(e => (
            <button key={e} onClick={() => setEmoji(e)} style={{ fontSize: 20, background: emoji === e ? LIGHT_ACCENT : BG, border: `2px solid ${emoji === e ? ACCENT : BORDER}`, borderRadius: 8, padding: "4px 8px", cursor: "pointer" }}>{e}</button>
          ))}
        </div>
        <div style={{ fontSize: 12, color: MUTED, marginBottom: 8 }}>НАЗВАНИЕ</div>
        <input value={title} onChange={e => setTitle(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()}
          placeholder="Например: Спорт, Чтение…"
          style={{ display: "block", width: "100%", marginBottom: 16, border: `1.5px solid ${BORDER}`, borderRadius: 10, padding: "10px 14px", fontSize: 14, color: TEXT, background: BG, outline: "none" }} />
        <div style={{ fontSize: 12, color: MUTED, marginBottom: 8 }}>ТИП</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          {[["checklist","✅ Список"],["note","📝 Заметка"]].map(([v,l]) => (
            <button key={v} onClick={() => setType(v)} style={{ flex: 1, padding: "9px", borderRadius: 10, cursor: "pointer", fontSize: 13, background: type === v ? LIGHT_ACCENT : BG, border: `2px solid ${type === v ? ACCENT : BORDER}`, color: type === v ? ACCENT : MUTED, fontWeight: type === v ? 600 : 400 }}>{l}</button>
          ))}
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ flex: 1, background: BG, border: `1px solid ${BORDER}`, borderRadius: 10, padding: "10px", fontSize: 14, color: MUTED, cursor: "pointer" }}>Отмена</button>
          <button onClick={submit} style={{ flex: 1, background: ACCENT, border: "none", borderRadius: 10, padding: "10px", fontSize: 14, color: "#fff", cursor: "pointer", fontWeight: 600 }}>Создать</button>
        </div>
      </div>
    </div>
  );
}

function CustomSection({ section, dateKey, onRemove }) {
  const list = useList(`custom-${section.id}-${dateKey}`);
  const [note, setNote] = useState(() => load(`custom-note-${section.id}-${dateKey}`, ""));
  useEffect(() => { save(`custom-note-${section.id}-${dateKey}`, note); }, [note]);
  return (
    <Section emoji={section.emoji} title={section.title} onRemove={onRemove}>
      {section.type === "checklist" ? (
        <><CheckList items={list.items} toggle={list.toggle} remove={list.remove} /><AddInput placeholder="Добавить пункт…" onAdd={list.add} /></>
      ) : (
        <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Введите заметку…" rows={4}
          style={{ width: "100%", marginTop: 12, border: `1.5px solid ${BORDER}`, borderRadius: 12, padding: "12px 14px", fontSize: 14, color: TEXT, background: BG, resize: "vertical", outline: "none", lineHeight: 1.6 }} />
      )}
    </Section>
  );
}

// ── main app ──────────────────────────────────────────────────────────────────
function App() {
  const tasks = useList(`tasks-${todayKey}`);
  const goals = useList(`goals`); // цели общие, не по дням
  const [customSections, setCustomSections] = useState(() => load("custom-sections", []));
  const [showModal, setShowModal] = useState(false);
  const [showArchive, setShowArchive] = useState(false);

  useEffect(() => { save("custom-sections", customSections); }, [customSections]);

  const doneTasks = tasks.items.filter(i => i.done).length;
  const totalTasks = tasks.items.length;
  const pct = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;

  return (
    <div style={{ minHeight: "100vh", background: BG }}>
      {showModal && <AddSectionModal onAdd={s => setCustomSections(p => [...p, s])} onClose={() => setShowModal(false)} />}
      {showArchive && <Archive onClose={() => setShowArchive(false)} />}

      {/* header */}
      <div style={{ background: WHITE, borderBottom: `1px solid ${BORDER}`, padding: "20px 24px 16px" }}>
        <div style={{ maxWidth: 680, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontSize: 12, color: MUTED, letterSpacing: 1, textTransform: "uppercase" }}>{todayLabel}</div>
              <h1 style={{ margin: "4px 0 0", fontSize: 26, fontWeight: 700, color: TEXT }}>Мой день</h1>
            </div>
            <button onClick={() => setShowArchive(true)} style={{ background: LIGHT_ACCENT, border: "none", borderRadius: 10, padding: "8px 16px", color: ACCENT, fontSize: 13, cursor: "pointer", fontWeight: 600, marginTop: 4 }}>
              📅 Архив
            </button>
          </div>

          {totalTasks > 0 && (
            <div style={{ marginTop: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: MUTED, marginBottom: 6 }}>
                <span>Задачи на сегодня</span>
                <span>{doneTasks}/{totalTasks} · {pct}%</span>
              </div>
              <div style={{ background: BORDER, borderRadius: 99, height: 6, overflow: "hidden" }}>
                <div style={{ width: `${pct}%`, height: "100%", borderRadius: 99, background: pct === 100 ? GREEN : ACCENT, transition: "width 0.4s ease" }} />
              </div>
            </div>
          )}
        </div>
      </div>

      {/* content */}
      <div style={{ maxWidth: 680, margin: "0 auto", padding: "20px 16px 40px" }}>

        <Section emoji="✅" title="Задачи на сегодня">
          <CheckList items={tasks.items} toggle={tasks.toggle} remove={tasks.remove} />
          <AddInput placeholder="Добавить задачу…" onAdd={tasks.add} />
        </Section>

        <Section emoji="🎯" title="Цели на неделю / месяц">
          <CheckList items={goals.items} toggle={goals.toggle} remove={goals.remove} accent="#7C6FEC" />
          <AddInput placeholder="Добавить цель…" onAdd={goals.add} accent="#7C6FEC" />
        </Section>

        <Section emoji="💭" title="Дневник / заметки">
          <Journal dateKey={todayKey} />
        </Section>

        {customSections.map(s => (
          <CustomSection key={s.id} section={s} dateKey={todayKey} onRemove={() => setCustomSections(p => p.filter(x => x.id !== s.id))} />
        ))}

        <button onClick={() => setShowModal(true)}
          style={{ width: "100%", background: WHITE, border: `2px dashed ${BORDER}`, borderRadius: 16, padding: "16px", fontSize: 15, color: MUTED, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
          ＋ Добавить раздел
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
