// ── days strip ───────────────────────────────────────────────────────────────
function getDaysAround(centerDate, count=7) {
  const days = [];
  const center = new Date(centerDate);
  for(let i = -Math.floor(count/2); i <= Math.floor(count/2); i++) {
    const d = new Date(center);
    d.setDate(center.getDate() + i);
    days.push(d.toISOString().split("T")[0]);
  }
  return days;
}

function formatDayShort(dateStr) {
  const d = new Date(dateStr);
  return {
    num: d.getDate(),
    dow: d.toLocaleDateString("ru-RU", {weekday:"short"}).slice(0,2).toUpperCase()
  };
}

// ── storage ──────────────────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

// ── hooks ────────────────────────────────────────────────────────────────────
function useList(storageKey) {
  const [items, setItems] = useState(() => load(storageKey, []));
  useEffect(() => { save(storageKey, items); }, [items]);
  const add = (text) => { if(text.trim()) setItems(p => [...p, {id: Date.now(), text: text.trim(), done: false}]); };
  const toggle = (id) => setItems(p => p.map(i => i.id===id ? {...i, done:!i.done} : i));
  const remove = (id) => setItems(p => p.filter(i => i.id!==id));
  return {items, add, toggle, remove};
}

// ── task item (read-only capable) ───────────────────────────────────────────
function TaskItem({item, onToggle, onRemove, readOnly}) {
  return (
    <div style={{display:"flex", alignItems:"center", gap:10, padding:"8px 0",
      borderBottom:`1px solid ${BORDER}`}}>
      <button onClick={readOnly ? undefined : onToggle} disabled={readOnly} style={{

        border:`2px solid ${item.done ? PURPLE : "#CCC"}`,

        display:"flex", alignItems:"center", justifyContent:"center",
        opacity: readOnly ? 0.85 : 1
      }}>
        {item.done && <span style={{color:"#fff", fontSize:11, fontWeight:"bold"}}>✓</span>}
      </button>
      <span style={{flex:1, fontSize:14, color: item.done ? MUTED : TEXT,
        textDecoration: item.done ? "line-through" : "none"}}>{item.text}</span>
      {!readOnly && (

}

// ── add input ────────────────────────────────────────────────────────────────
function AddInput({placeholder, onAdd}) {
  const [val, setVal] = useState("");
  const submit = () => { onAdd(val); setVal(""); };
  return (
    <div style={{display:"flex", gap:8, marginTop:10}}>
      <input value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&submit()}
        placeholder={placeholder}
        style={{flex:1, border:`1.5px solid ${BORDER}`, borderRadius:10,
          padding:"9px 12px", fontSize:14, color:TEXT, background:BG, outline:"none"}}/>
      <button onClick={submit} style={{
        width:40, height:40, borderRadius:10, background:PURPLE,
        border:"none", color:"#fff", fontSize:22, cursor:"pointer", flexShrink:0,
        display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1
      }}>+</button>
    </div>
  );
}

// ── quote bar (read-only capable) ───────────────────────────────────────────
function QuoteBar({dateKey, readOnly}) {
  const key = `quote-${dateKey}`;
  const [text, setText] = useState(() => load(key, ""));
  useEffect(() => { setText(load(key, "")); }, [dateKey]);
  useEffect(() => { if(!readOnly) save(key, text); }, [text]);
  return (
    <div style={{display:"flex", alignItems:"center", gap:8,
      background:WHITE, borderRadius:14, padding:"10px 14px",
      marginBottom:12, boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      <input value={text} onChange={e=> !readOnly && setText(e.target.value)}
        readOnly={readOnly}
        placeholder={readOnly ? "Цитаты дня не было..." : "Цитата дня..."}
        style={{flex:1, border:"none", outline:"none", fontSize:14,
          color: readOnly && !text ? MUTED : TEXT, background:"transparent"}}/>
      <button disabled={readOnly} style={{width:32, height:32, borderRadius:50,
        background: readOnly ? "#ccc" : PURPLE, border:"none", cursor: readOnly ? "default" : "pointer",
        display:"flex", alignItems:"center", justifyContent:"center", opacity: readOnly ? 0.6 : 1}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </button>
    </div>
  );
}

// ── days strip ───────────────────────────────────────────────────────────────
function DaysStrip({selectedDate, onSelect}) {
  const days = getDaysAround(selectedDate, 7);
  return (
    <div style={{display:"flex", gap:6, justifyContent:"center",
      background:WHITE, borderRadius:14, padding:"10px 12px",
      marginBottom:12, boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
      {days.map(d => {
        const {num, dow} = formatDayShort(d);
        const isSelected = d === selectedDate;
        const isFuture = d > todayKey;
        return (
          <button key={d} onClick={() => onSelect(d)} style={{
            display:"flex", flexDirection:"column", alignItems:"center",
            gap:2, padding:"6px 8px", borderRadius:10, border:"none",
            background: isSelected ? PURPLE : "transparent",
            cursor:"pointer", minWidth:34, opacity: isFuture ? 0.45 : 1
          }}>
            <span style={{fontSize:11, color: isSelected ? "#fff" : MUTED}}>{dow}</span>
            <span style={{fontSize:15, fontWeight: isSelected ? 700 : 400,
              color: isSelected ? "#fff" : TEXT}}>{num}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── helper: month label ─────────────────────────────────────────────────────
function monthLabel(monthKey) {
  // monthKey = "YYYY-MM"
  const [y,m] = monthKey.split("-").map(Number);
  const d = new Date(y, m-1, 1);
  return d.toLocaleDateString("ru-RU", {month:"long", year:"numeric"});
}

        </Card>

        <Card title={`Мои цели на месяц (${monthLabel(currentMonthKey)})`}>
          {goals.items.length===0 && <p style={{color:MUTED, fontSize:13, marginBottom:6}}>Пусто — добавьте первый пункт</p>}
          {goals.items.map(item=>(
            <TaskItem key={item.id} item={item}
              onToggle={()=>goals.toggle(item.id)}
              onRemove={()=>goals.remove(item.id)}/>
          ))}
          <AddInput placeholder="Добавить цель..." onAdd={goals.add}/>
        </Card>

        <Card title="Дневник/Мысли">
          <textarea value={journalText}
            onChange={e=>{setJournalText(e.target.value); setSaved(false);}}
            placeholder="Я сегодня думал о..."
            rows={5}
            style={{width:"100%", border:`1.5px solid ${BORDER}`, borderRadius:12,
              padding:"10px 12px", fontSize:14, color:TEXT, background:BG,
              resize:"none", outline:"none", lineHeight:1.6}}/>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:8}}>
            <span style={{fontSize:12, color: saved ? "#34C770" : MUTED}}>
              {saved ? "✓ Сохранено" : "Не сохранено"}
            </span>
            <button onClick={saveJournal} style={{
              background:PURPLE, border:"none", borderRadius:10,
              padding:"9px 22px", color:"#fff", fontSize:14, cursor:"pointer", fontWeight:600
            }}>Сохранить</button>
          </div>
        </Card>
      </div>
    </div>
  );
}

// ── PAGE: Calendar (Календарь) ─────────────────────────────────────────────
// Requirements:
// - show tasks/quote/journal for the SELECTED date, read-only history view
// - future dates (after today) show empty/locked state
// - past/today dates show whatever was saved that day, or empty if nothing was written
function PageCalendar({selectedDate, onSelect}) {
  const isFuture = selectedDate > todayKey;
  const isToday = selectedDate === todayKey;

  const tasks = load(`tasks-${selectedDate}`, []);
  const journalText = load(`journal-${selectedDate}`, "");
  const label = new Date(selectedDate).toLocaleDateString("ru-RU", {weekday:"long", day:"numeric", month:"long"});

  return (
    <div>
      <Header title="Календарь" subtitle={todayLabel}/>
      <div style={{padding:"0 14px"}}>
        <DaysStrip selectedDate={selectedDate} onSelect={onSelect}/>

        <div style={{padding:"0 4px 8px", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <div>
            <div style={{fontSize:13, color:MUTED, textTransform:"capitalize"}}>
              {new Date(selectedDate).toLocaleDateString("ru-RU",{weekday:"long"})}
            </div>
            <div style={{fontSize:17, fontWeight:700, color:TEXT}}>
              {new Date(selectedDate).toLocaleDateString("ru-RU",{day:"numeric", month:"long"})}
            </div>
          </div>
          {isFuture && <LockBadge text="День ещё не наступил"/>}
          {!isFuture && !isToday && <LockBadge text="Архив"/>}
        </div>

        {isFuture ? (
          <Card>
            <p style={{color:MUTED, fontSize:14, textAlign:"center", padding:"20px 0"}}>
              Этот день ещё не наступил
            </p>
          </Card>
        ) : (
          <>
            <Card title="Задачи">
              {tasks.length===0
                ? <p style={{color:MUTED, fontSize:13}}>Пусто</p>
                : tasks.map(t=>(
                    <TaskItem key={t.id} item={t} readOnly={true}/>
                  ))
              }
            </Card>

            <Card title="Дневник/Мысли">
              {journalText
                ? <p style={{fontSize:13, color:TEXT, lineHeight:1.6, whiteSpace:"pre-wrap"}}>{journalText}</p>
                : <p style={{color:MUTED, fontSize:13}}>Я не думал не о чем</p>
              }
            </Card>

            <QuoteBar dateKey={selectedDate} readOnly={true}/>
          </>
        )}
      </div>
    </div>
  );
}

// ── PAGE: Goals (Цели) ──────────────────────────────────────────────────────
// Requirements:
// - only current month is editable
// - past months are shown read-only/locked
// - new month opens automatically (just by date key changing) and old month locks
function PageGoals() {
  const now = new Date();
  // show current month + 1 previous month (both visible, only current editable)
  const months = [];
  for(let i=1; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    months.push(key);
  }

  return (
    <div>
      <Header title="Цели"/>
      <div style={{padding:"0 14px"}}>
        {months.map(monthKey => {
          const isCurrent = monthKey === currentMonthKey;
          const goalsKey = `goals-${monthKey}`;
          const list = useList(goalsKey);
          return (
            <div key={monthKey}>
              <div style={{padding:"6px 4px 4px", display:"flex", justifyContent:"space-between", alignItems:"baseline"}}>
                <div>
                  <div style={{fontSize:11, color:MUTED, textTransform:"uppercase", letterSpacing:1}}>month</div>
                  <div style={{fontSize:16, fontWeight:700, color:TEXT, textTransform:"capitalize"}}>{monthLabel(monthKey)}</div>
                </div>
                {!isCurrent && <LockBadge/>}
              </div>
              <Card title="Мои цели на месяц">
                {list.items.length===0
                  ? <p style={{color:MUTED, fontSize:13, marginBottom:6}}>Пусто</p>
                  : list.items.map(item=>(
                      <TaskItem key={item.id} item={item}
                        readOnly={!isCurrent}
                        onToggle={()=>list.toggle(item.id)}
                        onRemove={()=>list.remove(item.id)}/>
                    ))
                }
                {isCurrent && <AddInput placeholder="Добавить цель..." onAdd={list.add}/>}
              </Card>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── PAGE: Journal (Дневник) ─────────────────────────────────────────────────
// Requirements:
// - only TODAY is editable
// - past days: read-only, show what was written or empty placeholder
// - future days: locked/empty, not editable
function PageJournal({selectedDate, onSelect}) {
  const isToday = selectedDate === todayKey;
  const isFuture = selectedDate > todayKey;
  const key = `journal-${selectedDate}`;

  const [text, setText] = useState(() => load(key, ""));
  const [saved, setSaved] = useState(true);

  useEffect(() => {
    setText(load(key, ""));
    setSaved(true);
  }, [selectedDate]);

  const handleSave = () => { save(key, text); setSaved(true); };

  const label = new Date(selectedDate).toLocaleDateString("ru-RU", {weekday:"long", day:"numeric", month:"long"});

  return (
    <div>
      <Header title="Дневник" subtitle={todayLabel}/>
      <div style={{padding:"0 14px"}}>
        <DaysStrip selectedDate={selectedDate} onSelect={onSelect}/>

        <div style={{padding:"0 4px 8px", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <div>
            <div style={{fontSize:13, color:MUTED, textTransform:"capitalize"}}>
              {new Date(selectedDate).toLocaleDateString("ru-RU",{weekday:"long"})}
            </div>
            <div style={{fontSize:17, fontWeight:700, color:TEXT}}>
              {new Date(selectedDate).toLocaleDateString("ru-RU",{day:"numeric", month:"long"})}
            </div>
          </div>
          {isFuture && <LockBadge text="Ещё не наступил"/>}
          {!isFuture && !isToday && <LockBadge text="Закрыт для редактирования"/>}
        </div>

        <Card title="Дневник/Мысли">
          {isFuture ? (
            <p style={{color:MUTED, fontSize:14, textAlign:"center", padding:"20px 0"}}>
              Этот день ещё не наступил
            </p>
          ) : (
            <>
              <textarea value={text}
                onChange={e=>{ if(isToday){ setText(e.target.value); setSaved(false); } }}
                readOnly={!isToday}
                placeholder={isToday ? "Я сегодня думал о..." : "Я не думал не о чем"}
                rows={8}
                style={{width:"100%", border:`1.5px solid ${BORDER}`, borderRadius:12,
                  padding:"10px 12px", fontSize:14, color: (!isToday && !text) ? MUTED : TEXT,
                  background: isToday ? BG : "#F4F4F4",
                  resize:"none", outline:"none", lineHeight:1.6}}/>
              {isToday && (
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:10}}>
                  <span style={{fontSize:12, color: saved ? "#34C770" : MUTED}}>
                    {saved ? "✓ Сохранено" : "Не сохранено"}
                  </span>
                  <button onClick={handleSave} style={{
                    background:PURPLE, border:"none", borderRadius:10,
                    padding:"9px 22px", color:"#fff", fontSize:14, cursor:"pointer", fontWeight:600
                  }}>Сохранить</button>
                </div>
              )}
            </>
          )}
        </Card>

        {!isFuture && <QuoteBar dateKey={selectedDate} readOnly={!isToday}/>}
      </div>
    </div>
  );
}

// ── app ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("home");
  const [selectedDate, setSelectedDate] = useState(todayKey);

  const renderPage = () => {
    switch(tab) {
      case "home":     return <PageHome dateKey={todayKey}/>;
      case "calendar": return <PageCalendar selectedDate={selectedDate} onSelect={setSelectedDate}/>;
      case "goals":    return <PageGoals/>;
      case "journal":  return <PageJournal selectedDate={selectedDate} onSelect={setSelectedDate}/>;
    }
  };

  return (
    <div style={{background:BG, minHeight:"100vh", paddingBottom:80}}>
      {renderPage()}
      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
